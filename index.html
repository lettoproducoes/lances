<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letto Produções</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:#eee;
  display:flex;
  flex-direction:column;
  height:100vh;
}

h2{
  margin:0;
  padding:10px;
  text-align:center;
  background:#1e1e1e;
}

/* PLAYER */
#player{width:100%;height:220px;border:none;}

/* TIMELINE */
#timeline{
  height:14px;
  background:#2a2a2a;
  position:relative;
  cursor:pointer;
  border-radius:7px;
  margin:5px 0;
}
#progress{
  height:100%;
  width:0%;
  background:#2ecc71;
  border-radius:7px 0 0 7px;
  position:relative;
  z-index:1;
}
#handle{
  position:absolute;
  top:50%;
  left:0%;
  width:16px;
  height:16px;
  background:#ffffff;
  border:2px solid #3498db;
  border-radius:50%;
  transform:translate(-50%, -50%);
  z-index:2;
  touch-action: none;
}

/* CONTROLES */
.controls{display:flex;margin:5px;}
button{
  flex:1;
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  color:white;
}

.inicio{background:#2ecc71;}
.fim{background:#e74c3c;}
.playpause{background:#9b59b6;}
.skip{background:#f39c12;}
.enviar{background:#3498db;}

/* CONTADOR */
#contadorLance{text-align:center;font-weight:bold;}
.alerta{color:#e74c3c;}
.piscar{animation:piscar .8s infinite;}
@keyframes piscar{50%{opacity:.5;}}

/* LISTA */
#lancesContainer{
  flex:1;
  overflow:auto;
  padding:8px;
}

li{
  background:#181818;
  margin:4px 0;
  padding:8px;
  border-radius:6px;
  font-size:13px;
}

.info{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.valor{
  color:#2ecc71;
  font-size:12px;
}

.linhaBotoes{
  display:flex;
  gap:4px;
  margin-top:4px;
}

.ver,.remover{
  flex:1;
  font-size:11px;
  padding:4px;
  border-radius:6px;
}

.ver{background:#333;}
.remover{background:#e53935;}

.ativo{background:#2a2a2a;}

/* RODAPÉ FIXO */
#footer{
  background:#1e1e1e;
  padding:15px 10px 25px 10px;
  border-top:1px solid #333;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
}

#footer > div{
  flex:1 1 auto;
}

#total{
  font-weight:bold;
  font-size:16px;
}

#economia{
  font-size:12px;
  color:#2ecc71;
  font-weight:bold;
  margin-top:3px;
}

#footer .enviar{
  flex:0 0 auto;
  margin:0;
  padding:10px 15px;
}
</style>
</head>

<body>

<h2>⚽🏃‍♂️ LETTO 💪🥋</h2>

<iframe id="player"
src="https://player.vimeo.com/video/1175798353?background=1&autoplay=1&muted=1"
allow="autoplay; fullscreen"></iframe>

<div id="timeline">
  <div id="progress"></div>
  <div id="handle"></div>
</div>

<div class="controls">
  <button class="inicio" onclick="inicioLance()">🟢 Marcar Início</button>
  <button class="fim" onclick="fimLance()">🔴 Marcar Fim</button>
</div>

<div class="controls">
  <button class="skip" onclick="pular(-10)">⏪</button>
  <button class="playpause" id="btnPlayPause" onclick="toggle()">⏸️</button>
  <button class="skip" onclick="pular(10)">⏩</button>
</div>

<div id="contadorLance">⏱ Duração do lance: 0 s</div>

<div id="lancesContainer">
  <ul id="lista"></ul>
</div>

<div id="footer">
  <div>
    <div id="total">Total: R$0 (0 lances)</div>
    <div id="economia"></div>
  </div>
  <button class="enviar" onclick="enviar()">📤 Enviar Pedido</button>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>

<script>
const player = new Vimeo.Player('player');

const timeline = document.getElementById("timeline");
const progress = document.getElementById("progress");
const lista = document.getElementById("lista");
const btn = document.getElementById("btnPlayPause");
const handle = document.getElementById("handle");

let inicio = null, lances = [], ultimoTempo = 0, interval = null;
const preco = 15;

// Play/pause sync
player.on('play',()=>btn.innerText="⏸️");
player.on('pause',()=>btn.innerText="▶️");

// Atualiza timeline e bolinha
player.on('timeupdate', d => {
  if(d.duration){
    let percent = (d.seconds/d.duration)*100;
    progress.style.width = percent + "%";
    if(!arrastando) handle.style.left = percent + "%";
  }
  if(d.seconds < ultimoTempo - 0.5) reset();
  ultimoTempo = d.seconds;

  if(inicio !== null && d.seconds - inicio >= 10){
    finalizar(d.seconds);
  }
});

// Timeline click
timeline.onclick=e=>{
  const r=timeline.getBoundingClientRect();
  const p=(e.clientX-r.left)/r.width;
  player.getDuration().then(d=>player.setCurrentTime(d*p));
};

// Marcação
function reset(){
  inicio=null;
  clearInterval(interval);
  contadorLance.innerText="⏱ Duração do lance: 0 s";
  contadorLance.classList.remove("alerta","piscar");
}

function inicioLance(){
  player.play();
  player.getCurrentTime().then(t=>{
    clearInterval(interval);
    inicio=t;
    interval=setInterval(()=>{
      player.getCurrentTime().then(sec=>{
        let dur=sec-inicio;
        contadorLance.innerText=`⏱ Duração do lance: ${dur.toFixed(1)} s`;
        if(dur>=10) finalizar(sec);
        if(dur>10) contadorLance.classList.add("alerta","piscar");
        else contadorLance.classList.remove("alerta","piscar");
      });
    },100);
  });
}

function fimLance(){
  if(inicio===null) return alert("Marque início");
  player.getCurrentTime().then(f=>finalizar(f));
}

function finalizar(fim){
  if(inicio===null) return;
  let dur=fim-inicio;
  if(dur<3){ reset(); return; }
  let novo={inicio,fim,dur};
  if(lances.some(l=>Math.abs(l.inicio-novo.inicio)<0.5)){ reset(); return; }
  if(lances.some(l=>novo.inicio<l.fim && novo.fim>l.inicio)){ alert("Sobreposição!"); reset(); return; }
  lances.push(novo);
  lances.sort((a,b)=>a.inicio-b.inicio);
  clearInterval(interval);
  reset();
  render();
}

function calcDesc(i){
  let q=i+1;
  if(q===1) return 0;
  if(q>=10) return 0.2;
  return 0.1+((q-2)*(0.1/8));
}

function render(){
  lista.innerHTML="";
  timeline.querySelectorAll(".range").forEach(e=>e.remove());
  let total=0,totalSem=0;
  player.getDuration().then(duracao=>{
    lances.forEach((l,i)=>{
      let desc=calcDesc(i);
      let valor=preco*(1-desc);
      total+=valor;
      totalSem+=preco;

      let li=document.createElement("li");
      let info=document.createElement("div");
      info.className="info";
      info.innerHTML=`<span>Lance ${i+1} ${fmt(l.inicio)}-${fmt(l.fim)}</span>
                        <span class="valor">R$${valor.toFixed(2)} (-${Math.round(desc*100)}%)</span>`;

      let v=document.createElement("button");
      v.className="ver"; v.innerText="▶️ Ver";
      v.onclick=()=>{ player.setCurrentTime(l.inicio); document.querySelectorAll("li").forEach(x=>x.classList.remove("ativo")); li.classList.add("ativo"); };

      let r=document.createElement("button");
      r.className="remover"; r.innerText="🗑️ Remover";
      r.onclick=()=>{ lances=lances.filter(x=>x!==l); render(); };

      let box=document.createElement("div");
      box.className="linhaBotoes";
      box.append(v,r);

      li.append(info,box);
      lista.appendChild(li);

      let div=document.createElement("div");
      div.className="range";
      let left=(l.inicio/duracao)*100;
      let width=((l.fim-l.inicio)/duracao)*100;
      div.style.left=left+"%";
      div.style.width=width+"%";
      div.onclick=(e)=>{ e.stopPropagation(); player.setCurrentTime(l.inicio); };
      timeline.appendChild(div);
    });

    let economia=totalSem-total;
    document.getElementById("total").innerText=`Total: R$${total.toFixed(2)} (${lances.length} lance${lances.length!=1?'s':''})`;
    document.getElementById("economia").innerText=economia>0?`💰 Economizou R$${economia.toFixed(2)}`:"";
  });
}

function fmt(s){ let m=Math.floor(s/60); let sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
function toggle(){ player.getPaused().then(p?player.play():player.pause()); }
function pular(s){ player.getCurrentTime().then(t=>player.setCurrentTime(t+s)); }

// WhatsApp
function enviar(){
  let videoId='1175798353';
  let videoLink=`https://lettoproducoes.github.io/lances/?video=${videoId}`;
  let msg="⚽ Pedido Letto\n\n";
  msg+=`🎥 Vídeo completo: ${videoLink}\n\n`;
  lances.forEach((l,i)=>{ msg+=`Lance ${i+1}: ${fmt(l.inicio)} - ${fmt(l.fim)} (${l.dur.toFixed(1)}s)\n`; });
  let total=lances.reduce((acc,l,index)=>acc+preco*(1-calcDesc(index)),0);
  let totalSem=lances.length*preco;
  let descontoFinal=totalSem-total;
  msg+=`\n🎯 Desconto final: R$${descontoFinal.toFixed(2)}\n\n`;
  msg+=`💰 *TOTAL: R$${total.toFixed(2)}* (${lances.length} lance${lances.length!=1?'s':''})`;
  window.open(`https://wa.me/5531975017611?text=${encodeURIComponent(msg)}`);
}

// ARRASTAR BOLINHA TIMELINE
let arrastando=false;
handle.addEventListener("mousedown", startDrag);
handle.addEventListener("touchstart", startDrag);

document.addEventListener("mousemove", drag);
document.addEventListener("touchmove", drag);

document.addEventListener("mouseup", endDrag);
document.addEventListener("touchend", endDrag);

function startDrag(e){ e.preventDefault(); arrastando=true; }
function drag(e){
  if(!arrastando) return;
  let clientX = e.touches? e.touches[0].clientX : e.clientX;
  const rect=timeline.getBoundingClientRect();
  let p=(clientX-rect.left)/rect.width;
  if(p<0) p=0; if(p>1) p=1;
  handle.style.left=(p*100)+"%";
  progress.style.width=(p*100)+"%";
  player.getDuration().then(d=>player.setCurrentTime(d*p));
}
function endDrag(e){ arrastando=false; }
</script>

</body>
</html>
