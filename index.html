<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LETTO</title>

<style>
body { margin:0; font-family:Arial; background:#121212; color:#eee; display:flex; flex-direction:column; height:100vh; }
h2 { text-align:center; padding:10px; background:#1e1e1e; margin:0; }

#playerContainer {
  position: relative;
}

#player {
  width:100%;
  height:220px;
  border:none;
}

/* BOTÃO FULLSCREEN */
#btnFullscreen {
  position:absolute;
  top:10px;
  right:10px;
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
}

.controls-line { display:flex; justify-content:space-around; margin:5px; }

button {
  flex:1; margin:5px; padding:10px;
  border:none; border-radius:10px; font-size:14px; color:white;
}

.inicio {background:#2ecc71;}
.fim {background:#e74c3c;}
.playpause {background:#9b59b6;}
.skip {background:#f39c12;}
.enviar {background:#3498db;}

#contadorLance { text-align:center; font-weight:bold; }

#lancesContainer { flex:1; overflow:auto; padding:10px; }

li { background:#1f1f1f; margin:8px 0; padding:10px; border-radius:10px; }

.linhaLance { display:flex; justify-content:space-between; }
.linhaBotoes { display:flex; gap:5px; margin-top:5px; }

.ver {background:#333;}
.remover {background:#e53935;}

#summary { background:#1e1e1e; padding:10px; }
</style>
</head>

<body>

<h2>⚽🏃‍♂️ LETTO 💪🥋</h2>

<div id="playerContainer">
  <iframe id="player" allow="autoplay; fullscreen"></iframe>
  <button id="btnFullscreen" onclick="abrirFullscreen()">⛶</button>
</div>

<div class="controls-line">
  <button id="btnInicio" class="inicio" onclick="marcarInicio()">🟢 Marcar Início</button>
  <button class="fim" onclick="marcarFim()">🔴 Marcar Fim</button>
</div>

<div class="controls-line">
  <button class="skip" onclick="skip(-10)">⏪</button>
  <button id="btnPlayPause" class="playpause" onclick="playPause()">▶️ Play</button>
  <button class="skip" onclick="skip(10)">⏩</button>
</div>

<div id="contadorLance">⏱ 0s</div>

<div id="lancesContainer">
<ul id="lista"></ul>
</div>

<div id="summary">
<div id="total">Total: R$0 (0 lances)</div>
<button class="enviar" onclick="enviarLances()">📤 Enviar Pedido</button>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>

<script>
// VIDEO DINÂMICO
const params = new URLSearchParams(window.location.search);
const videoId = params.get("video") || "1175798353";

document.getElementById("player").src =
`https://player.vimeo.com/video/${videoId}?background=1&autoplay=1&muted=1`;

const player = new Vimeo.Player('player');

// FULLSCREEN
function abrirFullscreen(){
  const el = document.getElementById("playerContainer");

  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.msRequestFullscreen) el.msRequestFullscreen();
}

let inicio = null;
let lances = [];
let contadorInterval;

const btnInicio = document.getElementById("btnInicio");
const btnPlayPause = document.getElementById("btnPlayPause");

function formatarTempo(s){
  let m=Math.floor(s/60);
  let sec=Math.floor(s%60);
  return `${m}:${sec<10?'0':''}${sec}`;
}

function calcularValores(){
  let total=0;
  let descontoFinal=0;

  lances.forEach((l,i)=>{
    let desconto = i>=1 ? Math.min(0.1 + (i-1)*(0.1/8), 0.2) : 0;
    l.desconto = desconto;
    l.valor = 15*(1-desconto);
    total += l.valor;
    descontoFinal = desconto;
  });

  return {total, descontoFinal};
}

function marcarInicio(){
  player.getCurrentTime().then(t=>{
    inicio=t;
    btnInicio.innerText="🟢 "+formatarTempo(t);

    contadorInterval=setInterval(()=>{
      player.getCurrentTime().then(c=>{
        document.getElementById("contadorLance").innerText="⏱ "+(c-inicio).toFixed(1)+"s";
      });
    },100);
  });
}

function marcarFim(){
  if(inicio==null) return alert("Marque o início primeiro");

  player.getCurrentTime().then(fim=>{
    let dur=fim-inicio;

    if(dur<3) return alert("Mínimo 3s");
    if(dur>10) return alert("Máximo 10s");

    lances.push({inicio,fim,dur});

    inicio=null;
    clearInterval(contadorInterval);
    btnInicio.innerText="🟢 Marcar Início";
    document.getElementById("contadorLance").innerText="⏱ 0s";

    atualizar();
  });
}

function atualizar(){
  let ul=document.getElementById("lista");
  ul.innerHTML="";

  let resultado = calcularValores();

  lances.forEach((l,i)=>{
    let li=document.createElement("li");

    li.innerHTML=`
      <div class="linhaLance">
        Lance ${i+1} ${formatarTempo(l.inicio)}-${formatarTempo(l.fim)} (${l.dur.toFixed(1)}s)
      </div>
      <div class="linhaBotoes">
        <button class="ver" onclick="ver(${i})">▶️</button>
        <button class="remover" onclick="remover(${i})">🗑️</button>
      </div>
    `;

    ul.appendChild(li);
  });

  document.getElementById("total").innerText =
    `Total: R$${resultado.total.toFixed(2)} (${lances.length} lance${lances.length!==1?'s':''})`;
}

function ver(i){
  player.setCurrentTime(lances[i].inicio).then(()=>player.play());
}

function remover(i){
  lances.splice(i,1);
  atualizar();
}

function playPause(){
  player.getPaused().then(p=>{
    if(p){
      player.play();
      btnPlayPause.innerText="⏸️ Pause";
      btnInicio.innerText="🟢 Marcar Início";
    }else{
      player.pause();
      btnPlayPause.innerText="▶️ Play";
    }
  });
}

function skip(s){
  player.getCurrentTime().then(t=>player.setCurrentTime(t+s));
}

function enviarLances(){
  let msg="⚽ Pedido Letto\n\n";

  let linkVideo = `https://lettoproducoes.github.io/lances/?video=${videoId}`;
  msg += `🎥 Vídeo completo: ${linkVideo}\n\n`;

  let resultado = calcularValores();

  lances.forEach((l,i)=>{
    msg += `Lance ${i+1}: ${formatarTempo(l.inicio)} - ${formatarTempo(l.fim)} (${l.dur.toFixed(1)}s)\n`;
    msg += `💰 Valor: R$${l.valor.toFixed(2)} (desconto ${Math.round(l.desconto*100)}%)\n\n`;
  });

  msg += `💰 Total: R$${resultado.total.toFixed(2)} (${lances.length} lance${lances.length!==1?'s':''})\n`;
  msg += `🎯 Desconto final: ${Math.round(resultado.descontoFinal*100)}%`;

  window.open(`https://wa.me/5531975017611?text=${encodeURIComponent(msg)}`);
}

player.play();
</script>

</body>
</html>
