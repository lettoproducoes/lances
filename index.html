<!DOCTYPE html>
<html>
<head>
  <title>Letto Produções</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      background: #121212;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    h2 {
      text-align: center;
      padding: 10px;
      margin: 0;
      background: #1e1e1e;
      color: #fff;
    }
    #playerContainer { width: 100%; position: relative; }
    #player { 
      width: 100%; 
      height: 220px; 
      border: none;         /* remove borda */
      background: transparent;
    }

    .controls-line {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      margin: 5px;
    }

    button {
      flex: 1 1 auto;
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      min-width: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button span { margin-left: 5px; }

    .inicio { background: #2ecc71; color: white; }
    .fim { background: #e74c3c; color: white; }
    .playpause { background: #9b59b6; color: white; flex: 1 1 30%; }
    .skip { background: #f39c12; color: white; flex: 1 1 30%; }
    .enviar { background: #3498db; color: white; }

    #fimAviso {
      font-weight: bold;
      color: #e74c3c;
      margin: 10px 0;
      text-align: center;
      display: none;
    }

    #contadorLance {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin: 5px 0;
      color: #eee;
    }

    #lancesContainer {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 10px;
    }

    ul { list-style: none; padding: 0; margin: 0; }
    li {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      color: #eee;
      background: #1f1f1f;
    }

    .linhaLance {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .linhaBotoes {
      margin-top: 5px;
      display: flex;
      gap: 5px;
    }

    .ver, .remover {
      padding: 6px;
      font-size: 12px;
      border-radius: 8px;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }
    .ver { background: #333; color: white; }
    .remover { background: #e53935; color: white; }

    #summary {
      padding: 10px;
      background: #1e1e1e;
      border-top: 1px solid #333;
      color: #eee;
    }
    #total { font-size: 18px; font-weight: bold; }
    #desconto { font-size: 14px; color: #2ecc71; }
    .desconto0 { background: #1f1f1f; }
    .desconto10 { background: #2c2c2c; }
    .desconto15 { background: #383838; }
    .desconto20 { background: #444444; }
  </style>
</head>
<body>

<h2>⚽🏃‍♂️ LETTO 💪🥋</h2>

<div id="playerContainer">
  <iframe id="player"
    src="https://player.vimeo.com/video/1175798353?background=1&autoplay=1&muted=1"
    allow="autoplay; fullscreen" allowfullscreen>
  </iframe>
</div>

<div class="controls-line">
  <button id="btnInicio" class="inicio" onclick="marcarInicio()">
    🟢 <span>Marcar Início</span>
  </button>
  <button class="fim" onclick="marcarFim()">
    🔴 <span>Marcar Fim</span>
  </button>
</div>

<div class="controls-line">
  <button class="skip" onclick="skip(-10)">⏪ <span>10s</span></button>
  <button class="playpause" id="btnPlayPause" onclick="playPause()">▶️ <span>Play</span></button>
  <button class="skip" onclick="skip(10)">⏩ <span>10s</span></button>
</div>

<div id="contadorLance">⏱ Duração do lance: 0 s</div>
<div id="fimAviso">⛔ O vídeo terminou. Não é possível marcar novos lances.</div>

<div id="lancesContainer">
  <ul id="lista"></ul>
</div>

<div id="summary">
  <div id="total">Total: R$0 (0 lances)</div>
  <div id="desconto"></div>
  <button class="enviar" onclick="enviarLances()">📤 Enviar Pedido</button>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>
<script>
let inicio = null;
let lances = [];
let precoPorLance = 15;
let videoFinalizado = false;
let contadorInterval = null;

const btnInicio = document.getElementById("btnInicio");
const fimAviso = document.getElementById("fimAviso");
const contador = document.getElementById("contadorLance");
const btnPlayPause = document.getElementById("btnPlayPause");
const player = new Vimeo.Player('player');

function formatarTempo(segundos) {
  let m = Math.floor(segundos / 60);
  let s = Math.floor(segundos % 60);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function calcularTotal() {
  let total = 0;
  let desconto = 0;
  for (let i=0; i<lances.length; i++){
    let qtd = i+1;
    if(qtd===1) desconto=0;
    else if(qtd>=10) desconto=0.20;
    else desconto = 0.10 + ((qtd-2)*(0.10/8));

    lances[i].valor = precoPorLance*(1-desconto);
    lances[i].desconto = desconto;
    total += lances[i].valor;
  }

  document.getElementById("total").textContent =
    `Total: R$${total.toFixed(2)} (${lances.length} lance${lances.length!==1?'s':''})`;
  document.getElementById("desconto").textContent =
    desconto>0?`Desconto atual: ${Math.round(desconto*100)}%`:"";

  atualizarLista();
  return {total, desconto};
}

function atualizarLista() {
  const ul = document.getElementById("lista");
  ul.innerHTML = "";
  lances.forEach((l,i)=>{
    const li = document.createElement("li");
    let classe = l.desconto===0?"desconto0":l.desconto<0.15?"desconto10":l.desconto<0.20?"desconto15":"desconto20";
    li.className = classe;
    li.innerHTML = `
      <div class="linhaLance">Lance ${i+1} ⏱ ${formatarTempo(l.inicio)}-${formatarTempo(l.fim)} (${l.duracao.toFixed(1)}s)</div>
      <div class="linhaBotoes">
        <button class="ver" onclick="irParaLance(${i})">▶️ Ver</button>
        <button class="remover" onclick="removerLance(${i})">🗑️ Remover</button>
      </div>
    `;
    ul.appendChild(li);
  });
}

function atualizarContador(){
  if(inicio===null) return;
  player.getCurrentTime().then(sec=>{
    let duracao = sec - inicio;
    contador.textContent = `⏱ Duração do lance: ${duracao.toFixed(1)} s`;
  });
}

function marcarInicio() {
  if(videoFinalizado) return;
  player.getCurrentTime().then(sec=>{
    inicio = sec;
    btnInicio.textContent = `🟢 Marcar Início: ${formatarTempo(sec)}`;
    contadorInterval = setInterval(atualizarContador, 100);
  });
}

function marcarFim() {
  if(videoFinalizado){ 
    alert("O vídeo terminou! Não é possível marcar novos lances."); 
    return; 
  }
  player.getCurrentTime().then(sec=>{
    if(inicio===null){ alert("Marque o início primeiro!"); return; }
    let fim = sec;
    let duracao = fim-inicio;
    
    if(duracao < 3){ 
        alert("O lance deve ter no mínimo 3 segundos!"); 
        return; 
    }
    if(duracao > 10){   
        alert("O lance deve ter no máximo 10 segundos!"); 
        return; 
    }

    lances.push({inicio,fim,duracao,valor:0,desconto:0});
    inicio=null;
    clearInterval(contadorInterval);
    contador.textContent = `⏱ Duração do lance: 0 s`;
    btnInicio.textContent="🟢 Marcar Início";
    calcularTotal();
  });
}

function irParaLance(index){
  let lance = lances[index];
  player.setCurrentTime(lance.inicio).then(()=>player.play());
}

function removerLance(index){
  lances.splice(index,1);
  calcularTotal();
}

function enviarLances(){
  let mensagem = `⚽ Pedido Letto%0A%0A`;
  let linkVideo = `https://lettoproducoes.netlify.app/?video=1175798353`;
  mensagem += `🎥 Vídeo completo: ${linkVideo}%0A%0A`;
  lances.forEach((l,i)=>{
    mensagem += `Lance ${i+1}: ${formatarTempo(l.inicio)} - ${formatarTempo(l.fim)} (${l.duracao.toFixed(1)}s)%0A`;
    mensagem += `💰 Valor: R$${l.valor.toFixed(2)} (desconto ${l.desconto*100}%)%0A%0A`;
  });
  let resultado = calcularTotal();
  mensagem += `💰 Total: R$${resultado.total.toFixed(2)} (${lances.length} lance${lances.length!==1?'s':''})%0A`;
  mensagem += `🎯 Desconto final: ${resultado.desconto*100}%`;
  window.open(`https://wa.me/5531975017611?text=${mensagem}`);
}

function playPause(){
  player.getPaused().then(paused=>{
    if(paused) {
      player.play();
      btnPlayPause.innerHTML = "⏸️ <span>Pause</span>";
      // resetar botão de início ao clicar Play
      btnInicio.textContent = "🟢 Marcar Início";
    } else {
      player.pause();
      btnPlayPause.innerHTML = "▶️ <span>Play</span>";
    }
  });
}

function skip(segundos){
  player.getCurrentTime().then(t=>{
    let novo = t + segundos;
    if(novo<0) novo=0;
    player.setCurrentTime(novo);
  });
}

player.ready().then(() => {
    player.play().catch(() => {
        player.setVolume(0); 
        player.play();
    });
    player.getPaused().then(paused=>{
        if(paused){
            btnPlayPause.innerHTML = "▶️ <span>Play</span>";
        } else {
            btnPlayPause.innerHTML = "⏸️ <span>Pause</span>";
        }
    });
});

player.on('ended', function() {
  videoFinalizado = true;
  fimAviso.style.display = 'block';
  btnInicio.disabled = true;
});
</script>
</body>
</html>
