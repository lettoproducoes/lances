<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LETTO</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#121212;
  color:#fff;
}

/* HEADER */
h2 {
  text-align:center;
  padding:10px;
  background:#1e1e1e;
  margin:0;
}

/* WRAPPER */
#videoWrapper {
  position: relative;
  width: 100%;
  height: 220px;
  transition: 0.3s;
}

/* FULLSCREEN PRO */
.fullscreen {
  position: fixed !important;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  z-index:9999;
  background:black;
}

/* PLAYER */
#player {
  width:100%;
  height:100%;
  border:none;
}

/* OVERLAY */
#overlay {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

#overlay button {
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  padding:12px;
  border-radius:12px;
  font-size:16px;
}

/* CONTROLES */
#controlsTop {
  position:absolute;
  top:10px;
  right:10px;
}

.ctrlBtn {
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  padding:8px;
  border-radius:8px;
  margin-left:5px;
}

/* CONTADOR */
#contadorLance {
  text-align:center;
  padding:5px;
}

/* LISTA */
#lancesContainer {
  padding:10px;
}

li {
  background:#1f1f1f;
  margin:8px 0;
  padding:10px;
  border-radius:10px;
}

/* BOTÃO ENVIAR */
#summary {
  padding:10px;
  background:#1e1e1e;
}

button.enviar {
  width:100%;
  background:#3498db;
  padding:12px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>⚽🏃‍♂️ LETTO 💪🥋</h2>

<div id="videoWrapper">

  <iframe id="player"></iframe>

  <!-- CONTROLES TOP -->
  <div id="controlsTop">
    <button class="ctrlBtn" onclick="toggleFullscreen()">⛶</button>
    <button class="ctrlBtn" onclick="playPause()">▶️</button>
  </div>

  <!-- BOTÕES SOBREPOSTOS -->
  <div id="overlay">
    <button onclick="marcarInicio()">🟢 Início</button>
    <button onclick="marcarFim()">🔴 Fim</button>
  </div>

</div>

<div id="contadorLance">⏱ 0s</div>

<ul id="lista"></ul>

<div id="summary">
<div id="total">Total: R$0 (0 lances)</div>
<button class="enviar" onclick="enviarLances()">📤 Enviar Pedido</button>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>

<script>
// VIDEO DINÂMICO
const params = new URLSearchParams(window.location.search);
const videoId = params.get("video") || "1175798353";

document.getElementById("player").src =
`https://player.vimeo.com/video/${videoId}?background=1&autoplay=1&muted=1`;

const player = new Vimeo.Player('player');

let inicio=null;
let lances=[];
let contadorInterval;

// FULLSCREEN PRO
function toggleFullscreen(){
  document.getElementById("videoWrapper").classList.toggle("fullscreen");
}

// PLAY/PAUSE
function playPause(){
  player.getPaused().then(p=>{
    if(p) player.play();
    else player.pause();
  });
}

// FORMATAR TEMPO
function formatarTempo(s){
  let m=Math.floor(s/60);
  let sec=Math.floor(s%60);
  return `${m}:${sec<10?'0':''}${sec}`;
}

// INICIO
function marcarInicio(){
  player.getCurrentTime().then(t=>{
    inicio=t;

    contadorInterval=setInterval(()=>{
      player.getCurrentTime().then(c=>{
        document.getElementById("contadorLance").innerText="⏱ "+(c-inicio).toFixed(1)+"s";
      });
    },100);
  });
}

// FIM
function marcarFim(){
  if(inicio==null) return alert("Marque o início");

  player.getCurrentTime().then(fim=>{
    let dur=fim-inicio;

    if(dur<3) return alert("Mínimo 3s");
    if(dur>10) return alert("Máximo 10s");

    lances.push({inicio,fim,dur});

    inicio=null;
    clearInterval(contadorInterval);
    document.getElementById("contadorLance").innerText="⏱ 0s";

    atualizar();
  });
}

// ATUALIZAR
function atualizar(){
  let ul=document.getElementById("lista");
  ul.innerHTML="";
  let total=0;

  lances.forEach((l,i)=>{
    let desconto=i>=1?Math.min(0.1+(i-1)*(0.1/8),0.2):0;
    let valor=15*(1-desconto);
    total+=valor;

    let li=document.createElement("li");
    li.innerHTML=`
      Lance ${i+1}: ${formatarTempo(l.inicio)}-${formatarTempo(l.fim)} (${l.dur.toFixed(1)}s)
      <br>
      💰 R$${valor.toFixed(2)} (${Math.round(desconto*100)}%)
    `;
    ul.appendChild(li);
  });

  document.getElementById("total").innerText=
    `Total: R$${total.toFixed(2)} (${lances.length} lances)`;
}

// WHATSAPP
function enviarLances(){
  let msg="⚽ Pedido Letto\n\n";

  msg+=`🎥 Vídeo completo: https://lettoproducoes.github.io/lances/?video=${videoId}\n\n`;

  let total=0;
  let descontoFinal=0;

  lances.forEach((l,i)=>{
    let desconto=i>=1?Math.min(0.1+(i-1)*(0.1/8),0.2):0;
    let valor=15*(1-desconto);
    total+=valor;
    descontoFinal=desconto;

    msg+=`Lance ${i+1}: ${formatarTempo(l.inicio)} - ${formatarTempo(l.fim)} (${l.dur.toFixed(1)}s)\n`;
    msg+=`💰 Valor: R$${valor.toFixed(2)} (desconto ${Math.round(desconto*100)}%)\n\n`;
  });

  msg+=`💰 Total: R$${total.toFixed(2)} (${lances.length} lance${lances.length!=1?'s':''})\n`;
  msg+=`🎯 Desconto final: ${Math.round(descontoFinal*100)}%`;

  window.open(`https://wa.me/5531975017611?text=${encodeURIComponent(msg)}`);
}

player.play();
</script>

</body>
</html>
