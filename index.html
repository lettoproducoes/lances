<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letto Produções</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:#eee;
  display:flex;
  flex-direction:column;
  height:100vh;
}

h2{
  margin:0;
  padding:10px;
  text-align:center;
  background:#1e1e1e;
}

#player{width:100%;height:220px;border:none;}

#timeline{
  height:14px;
  background:#2a2a2a;
  position:relative;
  cursor:pointer;
}

#progress{
  height:100%;
  width:0%;
  background:#2ecc71;
}

.range{
  position:absolute;
  top:0;
  height:100%;
  background:#e74c3c;
  border-radius:3px;
  opacity:.7;
}

.range.ativo{
  background:#f1c40f;
  opacity:1;
}

/* CONTROLES */
.controls{display:flex;margin:5px;}
button{
  flex:1;
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  color:white;
}

.inicio{background:#2ecc71;}
.fim{background:#e74c3c;}
.playpause{background:#9b59b6;}
.skip{background:#f39c12;}
.enviar{background:#3498db;}

/* CONTADOR */
#contadorLance{text-align:center;font-weight:bold;}
.alerta{color:#e74c3c;}
.piscar{animation:piscar .8s infinite;}
@keyframes piscar{50%{opacity:.5;}}

/* LISTA */
#lancesContainer{
  flex:1;
  overflow:auto;
  padding:8px;
}

li{
  background:#181818;
  margin:4px 0;
  padding:8px;
  border-radius:6px;
  font-size:13px;
}

.info{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.valor{
  color:#2ecc71;
  font-size:12px;
}

.linhaBotoes{
  display:flex;
  gap:4px;
  margin-top:4px;
}

.ver,.remover{
  flex:1;
  font-size:11px;
  padding:4px;
  border-radius:6px;
}

.ver{background:#333;}
.remover{background:#e53935;}

.ativo{background:#2a2a2a;}

/* RODAPÉ FIXO - Ajustado para Safari/iOS */
#footer{
  background:#1e1e1e;
  padding:15px 10px 25px 10px; /* padding-bottom maior para evitar sobreposição */
  border-top:1px solid #333;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
}

#footer > div{
  flex:1 1 auto;
}

#footer .enviar{
  flex:0 0 auto;
  margin:0;
  padding:10px 15px; /* aumenta área clicável do botão */
}
</style>
</head>

<body>

<h2>⚽🏃‍♂️ LETTO 💪🥋</h2>

<iframe id="player"
src="https://player.vimeo.com/video/1175798353?background=1&autoplay=1&muted=1"
allow="autoplay; fullscreen"></iframe>

<div id="timeline">
  <div id="progress"></div>
</div>

<div class="controls">
  <button class="inicio" onclick="inicioLance()">🟢 Início</button>
  <button class="fim" onclick="fimLance()">🔴 Fim</button>
</div>

<div class="controls">
  <button class="skip" onclick="pular(-10)">⏪</button>
  <button class="playpause" id="btnPlayPause" onclick="toggle()">⏸️</button>
  <button class="skip" onclick="pular(10)">⏩</button>
</div>

<div id="contadorLance">⏱ Duração do lance: 0 s</div>

<div id="lancesContainer">
  <ul id="lista"></ul>
</div>

<div id="footer">
  <div>
    <div id="total">Total: R$0 (0 lances)</div>
    <div id="economia"></div>
  </div>
  <button class="enviar" onclick="enviar()">📤 Enviar Pedido</button>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>

<script>
const player = new Vimeo.Player('player');

const timeline = document.getElementById("timeline");
const progress = document.getElementById("progress");
const lista = document.getElementById("lista");
const btn = document.getElementById("btnPlayPause");

let inicio = null, lances = [], ultimoTempo = 0;
const preco = 15;

// play/pause sync
player.on('play',()=>btn.innerText="⏸️");
player.on('pause',()=>btn.innerText="▶️");

// timeline + lógica
player.on('timeupdate',d=>{
  if(d.duration) progress.style.width=(d.seconds/d.duration*100)+"%";
  if(d.seconds<ultimoTempo-0.5) reset();
  ultimoTempo=d.seconds;
  if(inicio!==null && d.seconds-inicio>=10) finalizar(d.seconds);
});

timeline.onclick=e=>{
  const r=timeline.getBoundingClientRect();
  const p=(e.clientX-r.left)/r.width;
  player.getDuration().then(d=>player.setCurrentTime(d*p));
};

function reset(){
  inicio=null;
  clearInterval(interval);
  contadorLance.innerText="⏱ Duração do lance: 0 s";
  contadorLance.classList.remove("alerta","piscar");
}

function inicioLance(){
  player.play();
  player.getCurrentTime().then(t=>{
    inicio=t;
    interval=setInterval(()=>{
      player.getCurrentTime().then(sec=>{
        let dur=sec-inicio;
        contadorLance.innerText=`⏱ Duração do lance: ${dur.toFixed(1)} s`;
        if(dur>10){
          contadorLance.classList.add("alerta","piscar");
        }else{
          contadorLance.classList.remove("alerta","piscar");
        }
      });
    },100);
  });
}

function fimLance(){
  if(inicio===null) return alert("Marque início");
  player.getCurrentTime().then(f=>finalizar(f));
}

function finalizar(fim){
  let dur=fim-inicio;
  if(dur<3) return;

  let novo={inicio,fim,dur};

  if(lances.some(l=>Math.abs(l.inicio-novo.inicio)<0.5)) return reset();
  if(lances.some(l=>novo.inicio<l.fim && novo.fim>l.inicio)){
    alert("Sobreposição!");
    return reset();
  }

  lances.push(novo);
  lances.sort((a,b)=>a.inicio-b.inicio);
  reset();
  render();
}

function calcDesc(i){
  let q=i+1;
  if(q===1) return 0;
  if(q>=10) return 0.2;
  return 0.1+((q-2)*(0.1/8));
}

function render(){
  lista.innerHTML="";
  timeline.querySelectorAll(".range").forEach(e=>e.remove());

  let total=0,totalSem=0;

  player.getDuration().then(duracao=>{

    lances.forEach((l,i)=>{
      let desc=calcDesc(i);
      let valor=preco*(1-desc);
      total += valor;
      totalSem += preco;

      let li=document.createElement("li");
      let info=document.createElement("div");
      info.className="info";
      info.innerHTML=`<span>Lance ${i+1} ${fmt(l.inicio)}-${fmt(l.fim)}</span>
                        <span class="valor">R$${valor.toFixed(2)} (-${Math.round(desc*100)}%)</span>`;

      let v=document.createElement("button");
      v.className="ver"; v.innerText="▶️ Ver";
      v.onclick=()=>{
        player.setCurrentTime(l.inicio);
        document.querySelectorAll("li").forEach(x=>x.classList.remove("ativo"));
        li.classList.add("ativo");
      };

      let r=document.createElement("button");
      r.className="remover"; r.innerText="🗑️ Remover";
      r.onclick=()=>{
        lances=lances.filter(x=>x!==l);
        render();
      };

      let box=document.createElement("div");
      box.className="linhaBotoes";
      box.append(v,r);

      li.append(info,box);
      lista.appendChild(li);

      let div=document.createElement("div");
      div.className="range";
      let left=(l.inicio/duracao)*100;
      let width=((l.fim-l.inicio)/duracao)*100;
      div.style.left=left+"%";
      div.style.width=width+"%";
      div.onclick=(e)=>{ e.stopPropagation(); player.setCurrentTime(l.inicio); };
      timeline.appendChild(div);
    });

    let economia=totalSem-total;
    document.getElementById("total").innerText=
      `Total: R$${total.toFixed(2)} (${lances.length} lance${lances.length!=1?'s':''})`;
    document.getElementById("economia").innerText=
      economia>0?`💰 Economizou R$${economia.toFixed(2)}`:"";
  });
}

function fmt(s){
  let m=Math.floor(s/60);
  let sec=Math.floor(s%60);
  return `${m}:${sec<10?'0':''}${sec}`;
}

function toggle(){
  player.getPaused().then(p=>p?player.play():player.pause());
}

function pular(s){
  player.getCurrentTime().then(t=>player.setCurrentTime(t+s));
}

// FUNÇÃO DE ENVIO COM EMOJIS COMPATÍVEIS
function enviar(){
  let videoId = '1175798353';
  let videoLink = `https://lettoproducoes.github.io/lances/?video=${videoId}`;
  let msg = "⚽ Pedido Letto\n\n";
  msg += `🏟️ Vídeo completo: ${videoLink}\n\n`;

  lances.forEach((l,i)=>{
    msg += `Lance ${i+1}: ${fmt(l.inicio)} - ${fmt(l.fim)} (${l.dur.toFixed(1)}s)\n`;
  });

  let total = lances.reduce((acc,i,index)=> acc + preco*(1-calcDesc(index)),0);
  let totalSem = lances.length * preco;
  let descontoFinal = totalSem - total;

  msg += `\n💰 Total: R$${total.toFixed(2)} (${lances.length} lance${lances.length != 1 ? 's' : ''})\n`;
  msg += `✔️ Desconto final: ${descontoFinal.toFixed(2)}`;

  window.open(`https://wa.me/5531975017611?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
