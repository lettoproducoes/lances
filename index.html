<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letto Produções</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:#eee;
  display:flex;
  flex-direction:column;
  height:100vh;
}

h2{
  margin:0;
  padding:10px;
  text-align:center;
  background:#1e1e1e;
}

/* PLAYER */
#player{width:100%;height:220px;border:none;}

/* TIMELINE */
#timeline{
  height:14px;
  background:#2a2a2a;
  position:relative;
  cursor:pointer;
  border-radius:7px;
  margin:5px 0;
}
#progress{
  height:100%;
  width:0%;
  background:#2ecc71;
  border-radius:7px 0 0 7px;
  position:relative;
  z-index:1;
}
#handle{
  position:absolute;
  top:50%;
  left:0%;
  width:16px;
  height:16px;
  background:#ffffff;
  border:2px solid #3498db;
  border-radius:50%;
  transform:translate(-50%, -50%);
  z-index:2;
  touch-action: none;
}

/* RANGE DOS LANCES (ADICIONADO) */
.range{
  position:absolute;
  top:0;
  height:100%;
  background:rgba(46,204,113,0.4);
  border-radius:7px;
  z-index:0;
}

/* CONTROLES */
.controls{display:flex;margin:5px;}
button{
  flex:1;
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  color:white;
}

.inicio{background:#2ecc71;}
.fim{background:#e74c3c;}
.playpause{background:#9b59b6;}
.skip{background:#f39c12;}
.enviar{background:#3498db;}

/* CONTADOR */
#contadorLance{text-align:center;font-weight:bold;}
.alerta{color:#e74c3c;}
.piscar{animation:piscar .8s infinite;}
@keyframes piscar{50%{opacity:.5;}}

/* LISTA */
#lancesContainer{
  flex:1;
  overflow:auto;
  padding:8px;
}

li{
  background:#181818;
  margin:4px 0;
  padding:8px;
  border-radius:6px;
  font-size:13px;
}

.info{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.valor{
  color:#2ecc71;
  font-size:12px;
}

.linhaBotoes{
  display:flex;
  gap:4px;
  margin-top:4px;
}

.ver,.remover{
  flex:1;
  font-size:11px;
  padding:4px;
  border-radius:6px;
}

.ver{background:#333;}
.remover{background:#e53935;}

/* RODAPÉ FIXO */
#footer{
  background:#1e1e1e;
  padding:15px 10px 25px 10px;
  border-top:1px solid #333;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
}

#footer > div{
  flex:1 1 auto;
}

#total{
  font-weight:bold;
  font-size:16px;
}

#economia{
  font-size:12px;
  color:#2ecc71;
  font-weight:bold;
  margin-top:3px;
}

#footer .enviar{
  flex:0 0 auto;
  margin:0;
  padding:10px 15px;
}

/* TELA DE CONFIRMAÇÃO */
#tela-confirmacao{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#121212;
  display:none;
  flex-direction:column;
  z-index:999;
}

#tela-confirmacao h2{
  text-align:center;
  padding:15px 10px 5px;
  margin:0;
}

#tela-confirmacao p{
  text-align:center;
  padding:0 15px;
  margin-bottom:10px;
  font-size:14px;
  line-height:1.4em;
}

/* TOTAL EM DESTAQUE */
#total-confirmacao{
  font-size:36px;
  font-weight:bold;
  color:#2ecc71;
  text-align:center;
  margin:10px 0 5px;
}

/* BLOCO DO TOTAL (MAIS VISUAL) */
.total-box{
  background:#1e1e1e;
  margin:10px;
  padding:15px;
  border-radius:12px;
  text-align:center;
  border:2px solid #2ecc71;
}

/* LISTA SCROLLÁVEL */
#lista-confirmacao{
  flex:1;
  overflow:auto;
  margin:10px;
}

#lista-confirmacao li{
  background:#181818;
  margin:4px 0;
  padding:8px;
  border-radius:6px;
  font-size:13px;
  display:flex;
  justify-content:space-between;
}

/* BOTÃO FIXO */
#confirmacao-footer{
  position:sticky;
  bottom:0;
  width:100%;
  background:#1e1e1e;
  padding:10px;
  border-top:1px solid #333;  
}

#btn-confirmar{
  width:100%;
  padding:14px;
  font-size:18px;
  background:#2ecc71;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#formulario{
  background:#181818;
  margin:10px;
  padding:15px;
  border-radius:12px;
  border:1px solid #333;

  display:flex;
  flex-direction:column;
  gap:12px;
  align-items:center;
}

.input-group{
  position:relative;
  width:100%;
  max-width:400px;
}

.input-group input{
  width:100%;
  padding:12px 12px 12px 38px;
  border-radius:8px;
  border:1px solid #333;
  background:#1e1e1e;
  color:#fff;
  font-size:14px;
  outline:none;
  transition:0.2s;
}

.input-group input:focus{
  border-color:#3498db;
}

/* Ícone */
.input-group span{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  opacity:0.7;
}

/* Validação */
.input-group input.valido{
  border-color:#2ecc71;
}

.input-group input.invalido{
  border-color:#e74c3c;
}

#formulario input{
  width:100%;
  max-width:400px; /* largura controlada (fica bonito no desktop) */
  padding:12px;
  border-radius:8px;
  border:none;
  font-size:14px;
  background:#1e1e1e;
  color:#fff;
  outline:none;
}

#formulario{
  background:#181818;
  margin:10px;
  padding:15px;
  border-radius:12px;
  border:1px solid #333;
}

#formulario input::placeholder{
  color:#aaa;
}

#tela-confirmacao{
  padding-bottom:80px;
}
</style>
</head>

<body>

<h2>⚽🏃‍♂️ LETTO 💪🥋</h2>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<div id="timeline">
  <div id="progress"></div>
  <div id="handle"></div>
</div>

<div class="controls">
  <button class="inicio" onclick="inicioLance()">🟢 Marcar Início</button>
  <button class="fim" onclick="fimLance()">🔴 Marcar Fim</button>
</div>

<div class="controls">
  <button class="skip" onclick="pular(-10)">⏪</button>
  <button class="playpause" id="btnPlayPause" onclick="toggle()">⏸️</button>
  <button class="skip" onclick="pular(10)">⏩</button>
</div>

<div id="contadorLance">⏱ Duração do lance: 0 s</div>

<div id="lancesContainer">
  <ul id="lista"></ul>
</div>

<div id="footer">
  <div>
    <div id="total">Total: R$0 (0 lances)</div>
    <div id="economia"></div>
  </div>  
  <button class="enviar" onclick="enviar()">📤 Enviar Pedido</button>
</div>

<div id="tela-confirmacao">
  <h2>⚡ Confirme seu Pedido ⚡</h2>

  <p>
    Confira os lances e preencha seus dados:<br>
    ⚠️ Na tela de pagamento do MercadoPago, **use exatamente este valor**, caso contrário a edição dos lances **não será iniciada**.
  </p>

  <div class="total-box">
    <div style="font-size:13px;opacity:0.7;">Valor total</div>
    <div id="total-confirmacao">R$0</div>
  </div>

  <!-- FORMULÁRIO -->
	<div id="formulario">

	  <div class="input-group">
		<input type="text" id="nome" placeholder="Nome Completo Responsável" required>
	  </div>

	  <div class="input-group">
		<input type="tel" id="telefone" placeholder="Telefone (WhatsApp)" required>
	  </div>

	  <div class="input-group">
		<input type="text" id="atleta" placeholder="Nome do Atleta" required>
	  </div>

	  <div class="input-group">
		<input type="text" id="clube" placeholder="Treinador / Clube" required>
	  </div>

	</div>

  <ul id="lista-confirmacao"></ul>

  <div id="confirmacao-footer">
    <button onclick="voltarEdicao()" style="width:100%;margin-bottom:8px;padding:10px;background:#444;border:none;border-radius:8px;color:#fff;">← Voltar e editar</button>
	<button id="btn-confirmar">💰 Finalizar e Enviar Pedido</button>
  </div>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>

<script>
function getVideoId(){
  const params = new URLSearchParams(window.location.search);
  return params.get('video') || '1175798353';
}

const videoId = getVideoId();
document.getElementById('player').src = `https://player.vimeo.com/video/${videoId}?background=1&autoplay=1&muted=1`;

const player = new Vimeo.Player('player');

player.on('loaded', ()=>{
  const tempoSalvo = localStorage.getItem('tempoVideo_'+videoId);
  
  if(tempoSalvo){
    player.getDuration().then(dur=>{
      if(parseFloat(tempoSalvo) < dur - 5){
        player.setCurrentTime(parseFloat(tempoSalvo));
      }
    });
  }

  if(tempoSalvo){
	  console.log("Continuar de onde parou?");
  }  

  if(tempoSalvo){
    player.setCurrentTime(parseFloat(tempoSalvo));
  }
});

const timeline = document.getElementById("timeline");
const progress = document.getElementById("progress");
const lista = document.getElementById("lista");
const btn = document.getElementById("btnPlayPause");
const handle = document.getElementById("handle");
const contadorLance = document.getElementById("contadorLance"); // corrigido

let inicio = null, lances = [], ultimoTempo = 0, interval = null;
const preco = 1;

let dadosSalvos = localStorage.getItem('pedidoLetto_${videoId}');

if(dadosSalvos){
  try{
    const dados = JSON.parse(dadosSalvos);

    lances = dados.lances || [];

    setTimeout(()=>{
      if(dados.nome) document.getElementById('nome').value = dados.nome;
      if(dados.telefone) document.getElementById('telefone').value = dados.telefone;
      if(dados.atleta) document.getElementById('atleta').value = dados.atleta;
      if(dados.clube) document.getElementById('clube').value = dados.clube;
    }, 200);

  }catch(e){
    lances = [];
  }
}

player.on('play',()=>btn.innerText="⏸️");
player.on('pause',()=>btn.innerText="▶️");

player.on('timeupdate', d => {
  if(d.duration){
    let percent = (d.seconds/d.duration)*100;
    progress.style.width = percent + "%";
    if(!arrastando) handle.style.left = percent + "%";
  }
  if(d.seconds < ultimoTempo - 0.5) reset();
  ultimoTempo = d.seconds;

  if(inicio !== null && d.seconds - inicio >= 10){
    finalizar(d.seconds);
  }
  
  // salva a cada 2 segundos (evita excesso de gravação)
  if(Math.floor(d.seconds) % 3 === 0){
    localStorage.setItem('tempoVideo_'+videoId, d.seconds);
    ultimoSalvamento = d.seconds;
  }
  
});

timeline.onclick=e=>{
  const r=timeline.getBoundingClientRect();
  const p=(e.clientX-r.left)/r.width;
  player.getDuration().then(d=>player.setCurrentTime(d*p));
};

function reset(){
  inicio=null;
  clearInterval(interval);
  contadorLance.innerText="⏱ Duração do lance: 0 s";
  contadorLance.classList.remove("alerta","piscar");
}

function inicioLance(){
  player.play();
  player.getCurrentTime().then(t=>{
    clearInterval(interval);
    inicio=t;
    interval=setInterval(()=>{
      player.getCurrentTime().then(sec=>{
        let dur=sec-inicio;
        contadorLance.innerText=`⏱ Duração do lance: ${dur.toFixed(1)} s`;
        if(dur>=10) finalizar(sec);
        if(dur>10) contadorLance.classList.add("alerta","piscar");
        else contadorLance.classList.remove("alerta","piscar");
      });
    },100);
  });
}

function fimLance(){
  if(inicio===null) return alert("Marque início");
  player.getCurrentTime().then(f=>finalizar(f));
}

function finalizar(fim){
  if(inicio===null) return;
  let dur=fim-inicio;

  if(dur<3){
    alert("O lance deve ter no mínimo 3 segundos");
    reset();
    return;
  }

  let novo={inicio,fim,dur};
  if(lances.some(l=>Math.abs(l.inicio - novo.inicio) < 1)){ reset(); return; }
  if(lances.some(l=>novo.inicio<l.fim && novo.fim>l.inicio)){ alert("Sobreposição!"); reset(); return; }

  lances.push(novo);
  salvarTudo();
  lances.sort((a,b)=>a.inicio-b.inicio);
  clearInterval(interval);
  reset();
  render();
}

function calcDesc(i){
  let q=i+1;
  if(q===1) return 0;
  if(q>=10) return 0.2;
  return Math.min(0.2, (q-1)*0.02);
}

function render(){
  lista.innerHTML="";
  timeline.querySelectorAll(".range").forEach(e=>e.remove());

  let total=0,totalSem=0;

  player.getDuration().then(duracao=>{
    lances.forEach((l,i)=>{
      let desc=calcDesc(i);
      let valor=preco*(1-desc);

      total+=valor;
      totalSem+=preco;

      let li=document.createElement("li");

      let info=document.createElement("div");
      info.className="info";
      li.innerHTML=`<div class="info"><span>Lance ${i+1} ${fmt(l.inicio)}-${fmt(l.fim)} (${l.dur.toFixed(1)}s)</span><span class="valor">💰 Esse lance: R$${valor.toFixed(2)} (-${Math.round(desc*100)}%)</span></div>`;

      let v=document.createElement("button");
      v.className="ver";
      v.innerText="▶️ Ver";
      v.onclick=()=>{
        player.setCurrentTime(l.inicio);
        document.querySelectorAll("li").forEach(x=>x.classList.remove("ativo"));
        li.classList.add("ativo");
      };

      let r=document.createElement("button");
      r.className="remover";
      r.innerText="🗑️ Remover";
      r.onclick=()=>{
        lances = lances.filter(x=>x!==l);
		salvarTudo();
        render();
      };

      let box=document.createElement("div");
      box.className="linhaBotoes";
      box.append(v,r);

      li.append(info,box);
      lista.appendChild(li);

      let div=document.createElement("div");
      div.className="range";
      let left=(l.inicio/duracao)*100;
      let width=((l.fim-l.inicio)/duracao)*100;
      div.style.left=left+"%";
      div.style.width=width+"%";
      div.onclick=(e)=>{
        e.stopPropagation();
        player.setCurrentTime(l.inicio);
      };

      timeline.appendChild(div);
    });

    let economia=totalSem-total;

    document.getElementById("total").innerText=`Total: R$${total.toFixed(2)} (${lances.length} lance${lances.length!=1?'s':''})`;
    document.getElementById("economia").innerText=economia>0?`💰 Economizou R$${economia.toFixed(2)}`:"";
  });
}

function fmt(s){
  let m=Math.floor(s/60);
  let sec=Math.floor(s%60);
  return `${m}:${sec<10?'0':''}${sec}`;
}

function toggle(){
  player.getPaused().then(p=>p?player.play():player.pause());
}

function pular(s){
  player.getCurrentTime().then(t=>player.setCurrentTime(t+s));
}

function enviar(){
  let total = lances.reduce((acc,l,i)=>acc + preco*(1-calcDesc(i)),0);

  document.getElementById('total-confirmacao').innerText = `R$${total.toFixed(2)}`;

  const ul = document.getElementById('lista-confirmacao');
  ul.innerHTML = '';

  lances.forEach((l,i)=>{
    let li = document.createElement('li');
    let desc = calcDesc(i);
    let valor = preco*(1-desc);

    li.innerHTML = `<span>Lance ${i+1} ${fmt(l.inicio)}-${fmt(l.fim)} (${l.dur.toFixed(1)}s)</span><span>R$${valor.toFixed(2)}</span>`;
    ul.appendChild(li);
  });

  document.getElementById('tela-confirmacao').style.display = 'flex';
  document.getElementById('footer').style.display = 'none';
}

document.getElementById('btn-confirmar').addEventListener('click', ()=>{

  // CAPTURA DADOS
  const nome = document.getElementById('nome').value.trim();
  const telefone = document.getElementById('telefone').value.trim();
  const atleta = document.getElementById('atleta').value.trim();
  const clube = document.getElementById('clube').value.trim();

  // VALIDAÇÃO
	const nomeValido = validarCampo(document.getElementById('nome'),'texto');
	const telValido = validarCampo(document.getElementById('telefone'),'telefone');
	const atletaValido = validarCampo(document.getElementById('atleta'),'texto');
	const clubeValido = validarCampo(document.getElementById('clube'),'texto');

	if(!nomeValido || !telValido || !atletaValido || !clubeValido){
	  alert("Preencha corretamente todos os campos!");
	  return;
	}
	
  let videoLink=`https://lettoproducoes.github.io/lances/?video=${videoId}`;

  let msg="⚽ *Pedido Letto*\n\n";

  // DADOS DO CLIENTE
  msg+=`👤 Nome: ${nome}\n`;
  msg+=`📱 WhatsApp: ${telefone}\n`;
  msg+=`🏃 Atleta: ${atleta}\n`;
  msg+=`🏆 Clube/Treinador: ${clube}\n\n`;

  msg+=`🎥 Vídeo completo:\n${videoLink}\n\n`;

  // LANCES
  lances.forEach((l,i)=>{
    msg+=`▶️ Lance ${i+1}: ${fmt(l.inicio)} - ${fmt(l.fim)} (${l.dur.toFixed(1)}s)\n`;
  });

  let total = lances.reduce((acc,l,index)=>acc+preco*(1-calcDesc(index)),0);
  let totalSem=lances.length*preco;
  let descontoFinal=totalSem-total;

  msg+=`\n🎯 Desconto: R$${descontoFinal.toFixed(2)}\n`;
  msg+=`💰 *TOTAL: R$${total.toFixed(2)}*\n`;

  // ENVIO MAIS CONFIÁVEL
  window.open(`https://wa.me/5531975017611?text=${encodeURIComponent(msg)}`, '_blank');
  
  localStorage.removeItem('pedidoLetto_${videoId}');

});

// DRAG TIMELINE
let arrastando=false;

handle.addEventListener("mousedown", e=>{
  e.preventDefault();
  arrastando=true;
});

handle.addEventListener("touchstart", e=>{
  e.preventDefault();
  arrastando=true;
});

document.addEventListener("mousemove", drag);
document.addEventListener("touchmove", drag);

function drag(e){
  if(!arrastando) return;

  let clientX = e.touches? e.touches[0].clientX : e.clientX;

  const rect=timeline.getBoundingClientRect();
  let p=(clientX-rect.left)/rect.width;

  if(p<0) p=0;
  if(p>1) p=1;

  handle.style.left=(p*100)+"%";
  progress.style.width=(p*100)+"%";

  player.getDuration().then(d=>player.setCurrentTime(d*p));
}

function voltarEdicao(){
  document.getElementById('tela-confirmacao').style.display = 'none';
  document.getElementById('footer').style.display = 'flex';
}

const telInput = document.getElementById('telefone');

telInput.addEventListener('input', (e)=>{
  let v = e.target.value.replace(/\D/g,'');

  if(v.length > 11) v = v.slice(0,11);

  if(v.length > 10){
    v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
  }else if(v.length > 6){
    v = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/, "($1) $2-$3");
  }else if(v.length > 2){
    v = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
  }else{
    v = v.replace(/^(\d*)$/, "($1");
  }

  e.target.value = v;
});

function salvarTudo(){
  const dados = {
    lances: lances,
    nome: document.getElementById('nome')?.value || '',
    telefone: document.getElementById('telefone')?.value || '',
    atleta: document.getElementById('atleta')?.value || '',
    clube: document.getElementById('clube')?.value || ''
  };

  localStorage.setItem('pedidoLetto_${videoId}', JSON.stringify(dados));
}

['nome','telefone','atleta','clube'].forEach(id=>{
  const el = document.getElementById(id);
  if(el){
    el.addEventListener('input', salvarTudo);
  }
});

if(lances.length){
  render();
}

function validarCampo(input, tipo){
  let valor = input.value.trim();

  if(tipo === 'texto'){
    if(valor.length >= 3){
      input.classList.add('valido');
      input.classList.remove('invalido');
      return true;
    }
  }

  if(tipo === 'telefone'){
    let numeros = valor.replace(/\D/g,'');
    if(numeros.length >= 10){
      input.classList.add('valido');
      input.classList.remove('invalido');
      return true;
    }
  }

  input.classList.add('invalido');
  input.classList.remove('valido');
  return false;
}

// listeners
document.getElementById('nome').addEventListener('input', e=>{
  validarCampo(e.target,'texto');
});

document.getElementById('telefone').addEventListener('input', e=>{
  validarCampo(e.target,'telefone');
});

document.getElementById('atleta').addEventListener('input', e=>{
  validarCampo(e.target,'texto');
});

document.getElementById('clube').addEventListener('input', e=>{
  validarCampo(e.target,'texto');
});

let ultimoSalvamento = 0;

document.addEventListener("mouseup", ()=>arrastando=false);
document.addEventListener("touchend", ()=>arrastando=false);

</script>

</body>
</html>
